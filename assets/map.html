<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPS Map</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .toolbar {
      position: absolute;
      z-index: 1000;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
    }

    button {
      border: 1px solid #9ca3af;
      background: #ffffff;
      color: #111827;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    button:hover {
      background: #f3f4f6;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="clearRoutePointsFromUi()">Clear</button>
  </div>
  <div id="map"></div>
  <script>
    let pythonBridge = null;
    const map = L.map('map').setView([25.0330, 121.5654], 13);
    const markers = [];
    let polyline = null;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
      new QWebChannel(qt.webChannelTransport, function(channel) {
        pythonBridge = channel.objects.pythonBridge;
      });
    }

    map.on('click', function(event) {
      if (pythonBridge) {
        pythonBridge.addPoint(event.latlng.lat, event.latlng.lng);
      }
    });

    window.setRoutePoints = function(points) {
      markers.forEach(marker => map.removeLayer(marker));
      markers.length = 0;
      if (polyline) {
        map.removeLayer(polyline);
        polyline = null;
      }

      const latLngs = points.map(point => [point.lat, point.lon]);
      latLngs.forEach((latLng, index) => {
        const marker = L.marker(latLng).addTo(map);
        marker.bindTooltip(String(index + 1), {permanent: true, direction: 'top'});
        markers.push(marker);
      });

      if (latLngs.length > 1) {
        polyline = L.polyline(latLngs, {color: '#2563eb', weight: 4}).addTo(map);
      }
    };

    window.clearRoutePoints = function() {
      window.setRoutePoints([]);
    };

    window.clearRoutePointsFromUi = function() {
      window.clearRoutePoints();
      if (pythonBridge) {
        pythonBridge.clearPoints();
      }
    };
  </script>
</body>
</html>
