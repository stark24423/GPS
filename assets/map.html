<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPS Map</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .toolbar {
      position: absolute;
      z-index: 1000;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
    }

    button {
      border: 1px solid #9ca3af;
      background: #ffffff;
      color: #111827;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    button:hover {
      background: #f3f4f6;
    }

    button:disabled {
      color: #9ca3af;
      background: #f3f4f6;
      cursor: not-allowed;
    }

    .current-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0ea5e9;
      border: 3px solid #ffffff;
      box-shadow: 0 0 0 2px #0369a1, 0 2px 8px rgba(0,0,0,0.35);
    }

    .current-dot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid rgba(14, 165, 233, 0.45);
      animation: pulse 1.5s ease-out infinite;
    }

    @keyframes pulse {
      from {
        width: 18px;
        height: 18px;
        opacity: 0.9;
      }
      to {
        width: 44px;
        height: 44px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="clearButton" onclick="clearRoutePointsFromUi()">Clear</button>
  </div>
  <div id="map"></div>
  <script>
    let pythonBridge = null;
    const defaultPosition = {lat: 24.7808548, lon: 121.0252718};
    const map = L.map('map').setView([defaultPosition.lat, defaultPosition.lon], 17);
    const markers = [];
    let editingLocked = false;
    let polyline = null;
    let currentMarker = null;
    let currentAnimationFrame = null;
    let currentAnimation = null;

    const currentIcon = L.divIcon({
      className: 'current-position-marker',
      html: '<div class="current-dot"></div>',
      iconSize: [24, 24],
      iconAnchor: [12, 12]
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    if (typeof QWebChannel !== 'undefined' && typeof qt !== 'undefined') {
      new QWebChannel(qt.webChannelTransport, function(channel) {
        pythonBridge = channel.objects.pythonBridge;
      });
    }

    map.on('click', function(event) {
      if (!editingLocked && pythonBridge) {
        pythonBridge.addPoint(event.latlng.lat, event.latlng.lng);
      }
    });

    window.setRoutePoints = function(points) {
      markers.forEach(marker => map.removeLayer(marker));
      markers.length = 0;
      if (polyline) {
        map.removeLayer(polyline);
        polyline = null;
      }

      const latLngs = points.map(point => [point.lat, point.lon]);
      latLngs.forEach((latLng, index) => {
        const marker = L.marker(latLng).addTo(map);
        marker.bindTooltip(String(index + 1), {permanent: true, direction: 'top'});
        markers.push(marker);
      });

      if (latLngs.length > 1) {
        polyline = L.polyline(latLngs, {color: '#2563eb', weight: 4}).addTo(map);
      }
    };

    window.clearRoutePoints = function() {
      window.setRoutePoints([]);
    };

    window.setCurrentPosition = function(point, status) {
      window.stopCurrentAnimation(status || 'Current');
      const latLng = [point.lat, point.lon];
      if (!currentMarker) {
        currentMarker = L.marker(latLng, {icon: currentIcon, zIndexOffset: 1000}).addTo(map);
      } else {
        currentMarker.setLatLng(latLng);
      }
      currentMarker.bindTooltip(status || 'Current', {permanent: true, direction: 'right', offset: [12, 0]});
      currentMarker.openTooltip();
    };

    window.startCurrentAnimation = function(points, stepMs) {
      if (!points || points.length === 0) {
        return;
      }
      window.stopCurrentAnimation('Simulating');
      const first = points[0];
      if (!currentMarker) {
        currentMarker = L.marker([first.lat, first.lon], {icon: currentIcon, zIndexOffset: 1000}).addTo(map);
      }
      currentMarker.bindTooltip('Simulating', {permanent: true, direction: 'right', offset: [12, 0]});
      currentMarker.openTooltip();

      if (points.length === 1) {
        currentMarker.setLatLng([first.lat, first.lon]);
        return;
      }

      currentAnimation = {
        points: points,
        stepMs: Math.max(120, stepMs || 1000),
        segmentIndex: 0,
        segmentStartTime: performance.now()
      };
      currentAnimationFrame = requestAnimationFrame(animateCurrentPosition);
    };

    function animateCurrentPosition(now) {
      if (!currentAnimation || !currentMarker) {
        return;
      }

      const points = currentAnimation.points;
      const index = currentAnimation.segmentIndex;
      if (index >= points.length - 1) {
        currentMarker.setLatLng([points[points.length - 1].lat, points[points.length - 1].lon]);
        currentMarker.setTooltipContent('Arrived');
        currentAnimation = null;
        currentAnimationFrame = null;
        return;
      }

      const start = points[index];
      const end = points[index + 1];
      const elapsed = now - currentAnimation.segmentStartTime;
      const rawT = Math.min(1, elapsed / currentAnimation.stepMs);
      const easedT = rawT < 0.5 ? 2 * rawT * rawT : 1 - Math.pow(-2 * rawT + 2, 2) / 2;
      const lat = start.lat + (end.lat - start.lat) * easedT;
      const lon = start.lon + (end.lon - start.lon) * easedT;
      currentMarker.setLatLng([lat, lon]);

      if (rawT >= 1) {
        currentAnimation.segmentIndex += 1;
        currentAnimation.segmentStartTime = now;
      }

      currentAnimationFrame = requestAnimationFrame(animateCurrentPosition);
    }

    window.stopCurrentAnimation = function(status) {
      if (currentAnimationFrame) {
        cancelAnimationFrame(currentAnimationFrame);
      }
      currentAnimationFrame = null;
      currentAnimation = null;
      if (currentMarker && status) {
        currentMarker.setTooltipContent(status);
      }
    };

    window.clearCurrentPosition = function() {
      window.stopCurrentAnimation();
      if (currentMarker) {
        map.removeLayer(currentMarker);
        currentMarker = null;
      }
    };

    window.clearRoutePointsFromUi = function() {
      if (editingLocked) {
        return;
      }
      window.clearRoutePoints();
      window.clearCurrentPosition();
      if (pythonBridge) {
        pythonBridge.clearPoints();
      }
    };

    window.setEditingLocked = function(locked) {
      editingLocked = Boolean(locked);
      const clearButton = document.getElementById('clearButton');
      clearButton.disabled = editingLocked;
      clearButton.title = editingLocked ? 'Stop the current simulation before clearing points.' : '';
      map.getContainer().style.cursor = editingLocked ? 'default' : '';
    };

    window.setCurrentPosition(defaultPosition, 'Start');
  </script>
</body>
</html>
